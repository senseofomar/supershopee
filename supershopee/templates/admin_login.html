<!DOCTYPE html>
<html>
<head>
    <title>Staff Access | Super Shopee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body" style="background: linear-gradient(rgba(6, 78, 59, 0.95), rgba(6, 78, 59, 0.98)), url('https://images.unsplash.com/photo-1556740738-b6a63e27c4df?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; background-size: cover;">

<div class="login-card" style="background: rgba(6, 78, 59, 0.9); border: 1px solid rgba(16, 185, 129, 0.2); backdrop-filter: blur(10px); color: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">

    <div style="text-align: center; margin-bottom: 2rem;">
        <span style="font-size: 3rem; display: block; margin-bottom: 10px;">🔐</span>
        <h2 style="margin: 0; font-size: 1.8rem;">Staff Portal</h2>
        <p style="color: #cbd5e1; margin-top: 5px;">Admin & Cashier access only.</p>
    </div>

    {% if error %}
    <div style="background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); padding: 12px; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-weight: 600; font-size: 0.9rem;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <label style="color: #cbd5e1;">Staff ID</label>
        <input type="text" name="username" placeholder="Enter staff username" required autofocus style="background: rgba(0,0,0,0.2); border-color: rgba(16, 185, 129, 0.3); color: white;">

        <label style="color: #cbd5e1;">Password</label>
        <input type="password" name="password" placeholder="Enter password" required style="background: rgba(0,0,0,0.2); border-color: rgba(16, 185, 129, 0.3); color: white;">

        <button type="submit" style="margin-top: 1.5rem; background: var(--accent); color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Authenticate</button>
    </form>

    <div style="margin-top: 2rem; text-align: center;">
        <a href="/" style="color: #cbd5e1; text-decoration: none; font-size: 0.85rem; transition: color 0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='#cbd5e1'">← Customer Login</a>
    </div>
</div>

</body>
</html>
