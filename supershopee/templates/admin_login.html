<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Super Shopee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="margin: 0; padding: 0; background: linear-gradient(rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.9)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=2000') center/cover;">
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background: white; padding: 3rem; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
            <h2 style="margin: 0; color: var(--primary);">Admin Portal</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Authorized access only</p>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Admin Username</label>
            <input type="text" name="username" required autofocus>
            <label>Password</label>
            <input type="password" name="password" required>
            <button type="submit">Authenticate</button>
        </form>
        <p style="text-align: center; margin-top: 2rem;"><a href="/" style="color: var(--accent);">← Back to Customer Login</a></p>
    </div>
</div>
</body>
</html>
