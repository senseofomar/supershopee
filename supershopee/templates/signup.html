<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | Super Shopee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="margin: 0; padding: 0;">
<div class="split-container">
    <div class="split-left">
        <div class="brand-logo">🛒 Super Shopee</div>
        <div class="hero-text">
            <h1>Join Our<br>Community</h1>
            <p>Get exclusive access to fresh groceries, special offers, and fast delivery.</p>
        </div>
    </div>

    <div class="split-right">
        <div class="form-wrapper">
            <h2>Create Account</h2>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
                <label>Password</label>
                <input type="password" name="password" required>
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
                <button type="submit">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                Already have an account? <a href="/" style="color: var(--accent); font-weight: 700;">Sign In</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
