<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | Super Shopee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; background: var(--surface); }
        .split-container { display: flex; min-height: 100vh; }
        .split-left {
            flex: 1.2;
            background: linear-gradient(to right, rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.4)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=2075&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            padding: 4rem 10%;
            color: white;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.1);
        }
        .brand-logo-white { font-size: 1.8rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 8px; margin-bottom: auto; }
        .brand-logo-white::after { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
        .hero-text-container { margin-bottom: auto; }
        .hero-text-container h1 { font-size: 4rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.1; letter-spacing: -1px; }
        .hero-text-container p { font-size: 1.3rem; color: #cbd5e1; max-width: 450px; line-height: 1.6; }
        .split-right { flex: 1; background: var(--surface); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; }
        .form-wrapper { width: 100%; max-width: 420px; }
        .divider { display: flex; align-items: center; text-align: center; margin: 2rem 0; color: var(--text-muted); font-size: 0.9rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider::before { margin-right: 1em; }
        .divider::after { margin-left: 1em; }
        @media (max-width: 960px) {
            .split-container { flex-direction: column; }
            .split-left { display: none; }
        }
    </style>
</head>
<body>
<div class="split-container">
    <div class="split-left">
        <div class="brand-logo-white">🛒 Super Shopee</div>
        <div class="hero-text-container">
            <h1>Join Our<br>Community.</h1>
            <p>Get exclusive access to fresh groceries, special offers, and fast delivery to your doorstep.</p>
        </div>
    </div>

    <div class="split-right">
        <div class="form-wrapper">
            <h2 style="margin-top: 0; margin-bottom: 2rem; color: var(--primary); font-weight: 700;">Create Your Account</h2>

            {% if error %}
            <div class="alert danger" style="margin-bottom: 1.5rem;">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <label>Choose a Username</label>
                <input type="text" name="username" placeholder="e.g. fresh_shopper" required autofocus>

                <label>Create a Password</label>
                <input type="password" name="password" placeholder="Strong password recommended" required>

                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Re-enter your password" required>

                <button type="submit">Create Account</button>
            </form>

            <div class="divider">or</div>

            <p style="text-align: center; color: var(--text-muted); margin: 1.5rem 0 0 0;">
                Already have an account? <a href="/" style="color: var(--accent); font-weight: 700; text-decoration: none;">Sign In</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
